[library]
id = "personal"
name = "Personal Prompt Library"
mode = "repo"
prompts_root = "prompts/"

[library.repository]
provider = "github"
owner = "bdavis"
name = "impromptu"
url = "https://github.com/bdavis/impromptu"

[[collections]]
id = "personal"
path = "personal/"
extensions = [".md"]
primary_file = "prompt.md"

[[collections]]
id = "scripts"
path = "scripts/"
extensions = [".md"]
primary_file = "prompt.md"
