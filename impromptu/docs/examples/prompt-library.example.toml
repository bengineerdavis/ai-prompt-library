[library]
id = "personal"
name = "Personal Prompt Library"
mode = "repo"
prompts_root = "prompts"

[repository]
provider = "github"
owner = "bengineerdavis"
name = "ai-prompt-library"
url = "https://github.com/bengineerdavis/ai-prompt-library"

[[collections]]
id = "personal"
path = "personal"
primary_file = "prompt.md"
extensions = [".md"]

[[collections]]
id = "scripts"
path = "scripts"
primary_file = "prompt.md"
extensions = [".md"]

[[collections]]
id = "writing"
path = "writing"
primary_file = "prompt.md"
extensions = [".md"]
